<!-- src/app/features/auth/login/login.component.html -->
<div class="min-h-[calc(100vh-64px)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gray-50 relative overflow-hidden">
  
  <!-- Decorative Background -->
  <div class="absolute inset-0 z-0">
    <div class="absolute -top-24 -left-24 w-96 h-96 rounded-full bg-indigo-50/50 blur-3xl"></div>
    <div class="absolute top-1/2 -right-24 w-72 h-72 rounded-full bg-purple-50/50 blur-3xl"></div>
  </div>

  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-xl border border-gray-100 relative z-10 animate-fade-in-up">
    <div class="text-center">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center text-white font-bold text-3xl shadow-lg mx-auto mb-6">
        H
      </div>
      <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Welcome Back</h2>
      <p class="mt-2 text-sm text-gray-500">Sign in to access your dashboard</p>
    </div>

    <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input id="email" type="email" formControlName="email"
            class="appearance-none relative block w-full px-4 py-3 border border-gray-200 placeholder-gray-400 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-shadow"
            [ngClass]="{'border-red-300 focus:ring-red-500': email?.invalid && email?.touched}"
            placeholder="Enter your email">
          <div class="mt-1 text-sm text-red-600 h-5" *ngIf="email?.invalid && email?.touched">
            <span *ngIf="email?.errors?.['required']">Email is required</span>
            <span *ngIf="email?.errors?.['email']">Please enter a valid email</span>
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative">
            <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
              class="appearance-none relative block w-full px-4 py-3 pr-20 border border-gray-200 placeholder-gray-400 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-shadow"
              [ngClass]="{'border-red-300 focus:ring-red-500': password?.invalid && password?.touched}"
              placeholder="Enter your password">
            <button type="button"
              class="absolute inset-y-0 right-3 my-auto h-8 px-2 text-sm font-semibold text-indigo-600 hover:text-indigo-700 focus:outline-none"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
          <div class="mt-1 text-sm text-red-600 min-h-5" *ngIf="password?.invalid && password?.touched">
            <span *ngIf="password?.errors?.['required']">Password is required</span>
            <span *ngIf="password?.errors?.['passwordStrength']">Use 8+ chars with uppercase, lowercase, number, and symbol</span>
          </div>
        </div>
      </div>

      <div class="flex items-center justify-between mt-4">
        <div class="flex items-center">
          <input id="remember-me" type="checkbox" formControlName="rememberMe" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded cursor-pointer">
          <label for="remember-me" class="ml-2 block text-sm text-gray-700 cursor-pointer">Remember me</label>
        </div>
        <div class="text-sm">
          <a routerLink="/auth/forgot-password" class="font-medium text-indigo-600 hover:text-indigo-500 transition-colors">Forgot password?</a>
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="isLoading"
          class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all shadow-md hover:shadow-indigo-500/30 disabled:opacity-70 disabled:cursor-not-allowed">
          <span *ngIf="!isLoading">Sign In</span>
          <svg *ngIf="isLoading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </div>
    </form>

    <div class="mt-6">
      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-200"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-3 bg-white text-gray-500 font-medium">Or continue with</span>
        </div>
      </div>

      <div class="mt-6">
        <button (click)="loginWithGitHub()" type="button" class="w-full inline-flex justify-center py-3.5 px-4 border border-gray-300 rounded-xl shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 gap-3 items-center">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" /></svg>
          GitHub
        </button>
      </div>
    </div>

    <p class="mt-8 text-center text-sm text-gray-600">
      Don't have an account?
      <a routerLink="/auth/register" class="font-bold text-indigo-600 hover:text-indigo-500 transition-colors">Sign up now</a>
    </p>
  </div>
</div>
