<!-- src/app/core/components/header/header.component.html -->
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 transition-all duration-300">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Logo -->
      <div class="flex-shrink-0 flex items-center">
        <a *ngIf="isLogoClickable()" [routerLink]="getLogoLink()" class="flex items-center gap-2 group" [attr.aria-label]="'HireConnect ' + getRoleLabel()">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center text-white font-bold text-xl shadow-lg group-hover:shadow-indigo-500/50 transition-all">
            H
          </div>
          <span class="font-bold text-xl tracking-tight text-gray-900 group-hover:text-indigo-600 transition-colors">HireConnect</span>
        </a>
        <span *ngIf="!isLogoClickable()" class="flex items-center gap-2 cursor-default" [attr.aria-label]="'HireConnect ' + getRoleLabel()">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center text-white font-bold text-xl shadow-lg transition-all">
            H
          </div>
          <span class="font-bold text-xl tracking-tight text-gray-900 transition-colors">HireConnect</span>
        </span>
      </div>

      <!-- Desktop Navigation -->
      <nav class="hidden md:flex space-x-8 items-center">
        <a *ngFor="let link of desktopLinks"
           [routerLink]="link.route"
           [routerLinkActive]="link.primary ? 'primary-nav-active' : 'text-indigo-600'"
           [ngClass]="link.primary ? 'bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-full font-medium transition-all shadow-md hover:shadow-indigo-500/50 hover:-translate-y-0.5' : 'text-gray-600 hover:text-indigo-600 font-medium transition-colors'">
          {{ link.label }}
        </a>
      </nav>

      <!-- User Menu & Mobile Toggle -->
      <div class="flex items-center gap-4">
        <ng-container *ngIf="currentUser">
          <!-- Notification Bell -->
          <div class="relative">
            <button (click)="toggleNotification()" class="p-2 text-gray-500 hover:text-indigo-600 transition-colors relative focus:outline-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
              </svg>
              <span *ngIf="unreadCount > 0" class="absolute top-1 right-1 flex h-4 w-4">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-4 w-4 bg-red-500 text-[10px] text-white font-bold items-center justify-center">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
              </span>
            </button>

            <!-- Notification Dropdown -->
            <div *ngIf="isNotificationOpen" class="absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-xl border border-gray-100 py-2 z-50 animate-fade-in-up">
              <div class="px-4 py-2 border-b border-gray-100 flex justify-between items-center">
                <h3 class="font-semibold text-gray-900">Notifications</h3>
                <a [routerLink]="getNotificationLink()" (click)="closeDrawers()" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium">View all</a>
              </div>
              <div class="max-h-80 overflow-y-auto" *ngIf="recentNotifications.length > 0">
                <a
                  *ngFor="let notification of recentNotifications"
                  [routerLink]="notification.actionUrl || '/notifications'"
                  (click)="closeDrawers()"
                  class="block px-4 py-3 border-b border-gray-50 hover:bg-gray-50"
                  [class.bg-indigo-50]="!notification.isRead">
                  <div class="flex items-start gap-3">
                    <span class="mt-1 h-2 w-2 rounded-full bg-indigo-500 flex-shrink-0" *ngIf="!notification.isRead"></span>
                    <span class="mt-1 h-2 w-2 rounded-full bg-gray-200 flex-shrink-0" *ngIf="notification.isRead"></span>
                    <div class="min-w-0">
                      <p class="text-sm font-medium text-gray-900 truncate">{{ notification.title }}</p>
                      <p class="text-xs text-gray-500 line-clamp-2">{{ notification.message }}</p>
                    </div>
                  </div>
                </a>
              </div>
              <div class="p-4 text-center text-sm text-gray-500" *ngIf="recentNotifications.length === 0">
                No new notifications
              </div>
            </div>
          </div>

          <!-- Profile Dropdown -->
          <div class="relative">
            <button (click)="toggleProfileMenu()" class="flex items-center gap-2 focus:outline-none">
              <div class="w-10 h-10 rounded-full bg-indigo-100 text-indigo-700 font-bold flex items-center justify-center border-2 border-white shadow-sm">
                {{ currentUser.email.charAt(0).toUpperCase() }}
              </div>
              <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            
            <div *ngIf="isProfileMenuOpen" class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border border-gray-100 py-2 z-50 animate-fade-in-up">
              <div class="px-4 py-3 border-b border-gray-50">
                <p class="text-sm font-medium text-gray-900 truncate">{{ currentUser.email }}</p>
                <p class="text-xs text-gray-500 capitalize">{{ currentUser.role.toLowerCase() }}</p>
              </div>
              <a *ngIf="currentUser.role !== 'ADMIN'" [routerLink]="getDashboardLink()" (click)="closeDrawers()" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-indigo-600">Dashboard</a>
              <a *ngIf="currentUser.role !== 'ADMIN'" [routerLink]="getProfileLink()" (click)="closeDrawers()" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-indigo-600">Profile Settings</a>
              <div *ngIf="currentUser.role !== 'ADMIN'" class="border-t border-gray-50 my-1"></div>
              <button (click)="logout()" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 font-medium">Sign Out</button>
            </div>
          </div>
        </ng-container>

        <!-- Mobile Menu Button -->
        <button (click)="toggleMenu()" class="md:hidden p-2 text-gray-500 hover:text-indigo-600 focus:outline-none">
          <svg *ngIf="!isMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
          <svg *ngIf="isMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div *ngIf="isMenuOpen" class="md:hidden bg-white border-b border-gray-200 animate-fade-in-down">
    <div class="px-4 pt-2 pb-4 space-y-1">
      <a *ngFor="let link of desktopLinks"
         [routerLink]="link.route"
         [routerLinkActive]="link.primary ? 'primary-nav-active' : 'text-indigo-600'"
         (click)="closeDrawers()"
         [ngClass]="link.primary ? 'block px-3 py-2 rounded-md text-base font-medium bg-indigo-600 text-white hover:bg-indigo-700' : 'block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-indigo-600 hover:bg-indigo-50'">
        {{ link.label }}
      </a>
    </div>
  </div>
</header>
